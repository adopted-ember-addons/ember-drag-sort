<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ember-drag-sort Tests</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div id="qunit"></div>
    <div id="qunit-fixture">
      <div id="ember-testing-container">
        <div id="ember-testing"></div>
      </div>
    </div>

    <script src="/testem.js" integrity="" data-embroider-ignore></script>
    <script data-embroider-ignore>
      // ember-qunit calls Testem.hookIntoTestFramework() at import time,
      // before QUnit is available as a global. Patch it to defer until QUnit exists.
      if (typeof Testem !== 'undefined') {
        var _originalHook = Testem.hookIntoTestFramework;
        Testem.hookIntoTestFramework = function() {
          if (typeof QUnit !== 'undefined') {
            _originalHook.call(Testem);
          }
        };
      }
    </script>
    <script type="module">
      import "ember-testing";
    </script>

    <script type="module">
      import { start } from "./test-helper.js";
      import.meta.glob("./**/*.{js,ts,gjs,gts}", { eager: true });
      start();
    </script>
  </body>
</html>
